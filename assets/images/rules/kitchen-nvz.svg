<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
<title id="title">Kitchen non-volley zone visual comparison</title>
<desc id="desc">Legal example on the left and fault example on the right.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#faf8ff"/></linearGradient>
  <filter id="shadow"><feDropShadow dx="0" dy="7" stdDeviation="10" flood-color="#2f1748" flood-opacity=".09"/></filter>
  <marker id="arrowG" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#159765"/></marker>
  <marker id="arrowR" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#d73655"/></marker>
</defs>
<rect width="1200" height="520" rx="26" fill="url(#bg)"/>
<g filter="url(#shadow)">
 <rect x="28" y="30" width="556" height="460" rx="22" fill="#fff" stroke="#bfe9d6" stroke-width="2"/>
 <rect x="616" y="30" width="556" height="460" rx="22" fill="#fff" stroke="#f3c5cf" stroke-width="2"/>
</g>
<rect x="28" y="30" width="556" height="72" rx="22" fill="#edf9f3"/><rect x="28" y="80" width="556" height="22" fill="#edf9f3"/>
<rect x="616" y="30" width="556" height="72" rx="22" fill="#fff0f3"/><rect x="616" y="80" width="556" height="22" fill="#fff0f3"/>
<circle cx="70" cy="66" r="18" fill="#159765"/><path d="M62 66l6 7 12-15" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
<text x="100" y="74" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#147a55">LEGAL</text>
<circle cx="658" cy="66" r="18" fill="#d73655"/><path d="M650 58l16 16m0-16l-16 16" stroke="white" stroke-width="5" stroke-linecap="round"/>
<text x="688" y="74" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#ba263f">FAULT</text>
<!-- courts -->
<g stroke="#ffffff" stroke-width="4">
 <rect x="70" y="145" width="470" height="225" rx="7" fill="#88a9d2"/>
 <line x1="305" y1="145" x2="305" y2="370"/><line x1="70" y1="257.5" x2="540" y2="257.5"/>
 <rect x="264" y="145" width="82" height="225" fill="#8bc99c" opacity=".75"/>
 <line x1="305" y1="145" x2="305" y2="370" stroke="#27334d" stroke-width="7"/>
 <rect x="658" y="145" width="470" height="225" rx="7" fill="#88a9d2"/>
 <line x1="893" y1="145" x2="893" y2="370"/><line x1="658" y1="257.5" x2="1128" y2="257.5"/>
 <rect x="852" y="145" width="82" height="225" fill="#ef9ba7" opacity=".72"/>
 <line x1="893" y1="145" x2="893" y2="370" stroke="#27334d" stroke-width="7"/>
</g>
<circle cx="235" cy="190" r="10" fill="#f6c744"/><path d="M230 185 Q200 230 250 280" fill="none" stroke="#159765" stroke-width="6" stroke-dasharray="10 8" marker-end="url(#arrowG)"/><rect x="220" y="285" width="22" height="62" rx="8" fill="#48305f"/><circle cx="231" cy="270" r="14" fill="#f3c5a7"/>
<circle cx="820" cy="185" r="10" fill="#f6c744"/><path d="M815 188 Q840 230 870 260" fill="none" stroke="#d73655" stroke-width="6" marker-end="url(#arrowR)"/><rect x="840" y="270" width="22" height="65" rx="8" fill="#48305f"/><circle cx="851" cy="255" r="14" fill="#f3c5a7"/><path d="M845 335 l35 26" stroke="#d73655" stroke-width="7"/><circle cx="880" cy="361" r="25" fill="none" stroke="#d73655" stroke-width="6"/>
<text x="70" y="425" font-family="Arial, sans-serif" font-size="23" fill="#21302a">Bounce first, then step into the kitchen.</text>
<text x="658" y="425" font-family="Arial, sans-serif" font-size="23" fill="#3d252b">Volley momentum carries player into NVZ.</text>
</svg>